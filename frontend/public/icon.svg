<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>

  <!-- File icon with morph effect -->
  <g transform="translate(256,220)">
    <!-- Left file -->
    <path d="M-100-80 L-20-80 L-20-30 L-100-30 Z" fill="none" stroke="#818cf8" stroke-width="18" stroke-linejoin="round"/>
    <path d="M-20-80 L-20-50 L-50-50" fill="none" stroke="#818cf8" stroke-width="18" stroke-linejoin="round"/>
    <!-- Text lines -->
    <line x1="-80" y1="-15" x2="-30" y2="-15" stroke="#818cf8" stroke-width="14" stroke-linecap="round"/>
    <line x1="-80" y1="12" x2="-50" y2="12" stroke="#818cf8" stroke-width="14" stroke-linecap="round"/>

    <!-- Middle arrow -->
    <path d="M-12-20 L28-20 M18-30 L28-20 L18-10" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Right file (transformed) -->
    <path d="M36-80 L116-80 L116-30 L36-30 Z" fill="none" stroke="#34d399" stroke-width="18" stroke-linejoin="round"/>
    <path d="M116-80 L116-50 L86-50" fill="none" stroke="#34d399" stroke-width="18" stroke-linejoin="round"/>
    <!-- Text lines -->
    <line x1="56" y1="-15" x2="106" y2="-15" stroke="#34d399" stroke-width="14" stroke-linecap="round"/>
    <line x1="56" y1="12" x2="76" y2="12" stroke="#34d399" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- "FM" label -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="8">FileMorph</text>
</svg>
